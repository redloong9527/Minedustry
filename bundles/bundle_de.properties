minedustry.name = Minedustry
minedustry.description = Diese Mod fügt einige Kreaturen, Blöcke, Gegenstände und Statuseffekte aus Minecraft zu Mindustry hinzu. Folgende Sprachen werden unterstützt: English, 中文 (danke an redloong9527 auf GitHub) und Deutsch.
block.minedustry-cobblestone-generator.name = Bruchstein-generator
block.minedustry-cobblestone-generator.description = Zieht Magma aus der Kruste eines Planeten, um mithilfe von Wasser Bruchstein herzustellen.
block.minedustry-cobblestone-melter.name = Bruchstein-schmelzer
block.minedustry-cobblestone-melter.description = Schmelzt Bruchstein zu Lava
block.minedustry-diamond-press.name = Diamant Presse
block.minedustry-diamond-press.description = Presst Kohle unter extremem Druck zu Diamanten, benötigt Wasser zur kühlung.
block.minedustry-lava-cooler.name = Lava Kühler
block.minedustry-lava-cooler.description = Lässt Lava schnell erstarren, um Obsidian zu machen.
block.minedustry-netherite-forge.name = Netherite Schmiede
block.minedustry-netherite-forge.description = Fusioniert Schrott und Spannungslegierung zu einem starken Metall.
block.minedustry-redstone-blender.name = Redstone Mixer
block.minedustry-redstone-blender.description = Mixt Spannunslegierung und Thorium zu Redstonestaub.
block.minedustry-calcite-extractor.name = Kalzit Extractor
block.minedustry-calcite-extractor.description = Spült Kalzit aus dem Boden, ein Teil des verbrauchten Wassers kann wiedervewendet werden.

block.minedustry-mob-spawner.name = Mob Spawner
block.minedustry-mob-spawner.description = Erschafft Minecraft Kreaturen
block.minedustry-boss-spawner.name = Boss Spawner
block.minedustry-boss-spawner.description = Erschafft Minecraft Boss Kreaturen

block.minedustry-cobblestone.name = Bruchstein
block.minedustry-diamond-block.name = Diamantblock
block.minedustry-diamond-block.description = Minecraft Diamantblock, absorbiert Laser
block.minedustry-netherite-block.name = Netheriteblock
block.minedustry-netherite-block.description = Minecraft Netheriteblock, leitet Strom
block.minedustry-obsidian.name = Obsidian
block.minedustry-obsidian.description = Minecraft Obsidian, zerspringt bei zerstörung in Scherben
block.minedustry-redstone-block.name = Redstoneblock
block.minedustry-tnt.name = TNT
block.minedustry-tnt.description = Explodiert gewaltig wenn zerstört.
block.minedustry-gunpowder-factory.name = Schießpulverfabrik
block.minedustry-gunpowder-factory.description = Fabrik zur Herstellung von Schießpulver.

item.minedustry-cobblestone-item.name = Bruchstein
item.minedustry-cobblestone-item.description = Ein einfach produzierbarer, relativ harter Stein. Gut für billige Wände am Anfang des Spiels.
item.minedustry-diamond.name = Diamant
item.minedustry-diamond.description = Funkelnder, sehr harter Stein.
item.minedustry-netherite-ingot.name = Netheritebarren
item.minedustry-netherite-ingot.description = Sehr starke Metallegierung.
item.minedustry-obsidian-item.name = Obsidian
item.minedustry-obsidian-item.description = Schnell abkekühlte Lava, ist aus irgendeinem Grund sehr stabil.
item.minedustry-redstone.name = Redstonestaub
item.minedustry-redstone.description = Geladener, roter, radioaktiver Staub.
item.minedustry-calcite.name = Calcit
item.minedustry-calcite.description = Ein weiches Mineral, das unterirdisch in Zypern sehr häufig vorkommt und für die Herstellung von kalziumbasierten Produkten unerlässlich ist.
item.minedustry-gunpowder.name = Schießpulver
item.minedustry-gunpowder.description = Wird zur Herstellung von TNT verwendet.

liquid.minedustry-lava.name = Lava
liquid.minedustry-lava.description = Sehr heißes, geschmolzenes Gestein. Mit Vorsicht zu behandeln!

status.minedustry-absorption.name = Absorbtion
status.minedustry-absorption.description = Erhöt die maximalen Lebenspunkte temporär.
status.minedustry-hunger.name = Hunger
status.minedustry-hunger.description = Macht Einheiten ineffizienter und schwächer.
status.minedustry-levitation.name = Levitaion
status.minedustry-levitation.description = Lässt Einheiten leicht über dem Boden schweben und verlangsamt sie dabei drastisch. Nicht stark genug, um Einheiten völlig anzuheben und schützt auch nicht vor tiefen Flüssigkeiten.
status.minedustry-mining-fatigue.name = Abbaulähmung
status.minedustry-mining-fatigue.description = Verringgert die Baugeschwindigkeit auf ein Minimum. Die Angriffsgeschwindigkeit wird als Nebeneffekt auch verringert.
status.minedustry-poison.name = Vergiftung
status.minedustry-poison.description = Verursacht mit der Zeit Schaden, relativ schwach.
status.minedustry-regeneration.name = Regeneration
status.minedustry-regeneration.description = Heilt mit der Zeit Einheiten, relativ schwach.
status.minedustry-saturation.name = Sättigung
status.minedustry-saturation.description = Macht Einheiten effizienter und stärker
status.minedustry-speed.name = Schnelligkeit
status.minedustry-speed.description = Macht Einheiten schneller
status.minedustry-strength.name = Stärke
status.minedustry-strength.description = Macht Einheiten stärker
status.minedustry-weakness.name = Schwäche
status.minedustry-weakness.description = Macht Einheiten schwächer
status.minedustry-wither-effect.name = Ausdörrung
status.minedustry-wither-effect.description = Verursacht mit der Zeit Schaden, stärker als Vergiftung.


