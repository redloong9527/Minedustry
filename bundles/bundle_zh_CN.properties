#由redloong9527翻译
minedustry.name = Minedustry
minedustry.description = 在 Mindustry 加入了一些 Minecraft 的生物、方块、物品和状态效果 。支持以下语言：English、中文（由 redloong9527 翻译）和Deutsch。
block.minedustry-cobblestone-generator.name = 刷石机
block.minedustry-cobblestone-generator.description = 利用水从地壳中提取岩浆，制成圆石。在灼热地形上更高效。
block.minedustry-cobblestone-melter.name = 岩浆机
block.minedustry-cobblestone-melter.description = 将圆石熔化成岩浆。
block.minedustry-diamond-press.name = 钻石压缩机
block.minedustry-diamond-press.description = 在极高压力下将煤炭压制成钻石，需要用水作为冷却剂。
block.minedustry-lava-cooler.name = 岩浆冷凝器
block.minedustry-lava-cooler.description = 快速冷却岩浆以形成黑曜石。
block.minedustry-netherite-forge.name = 下界合金熔炉
block.minedustry-netherite-forge.description = 将废料和巨浪合金锻造成坚固的下界合金。
block.minedustry-redstone-blender.name = 红石搅拌机
block.minedustry-redstone-blender.description = 将巨浪合金和钍混合成红石粉。
block.minedustry-calcite-extractor.name = 方解石提取机
block.minedustry-calcite-extractor.description = 从地面冲洗方解石，部分消耗的水可以循环利用。
block.minedustry-mob-spawner.name = 刷怪笼
block.minedustry-mob-spawner.description = 产生我的世界生物。
block.minedustry-boss-spawner.name = Boss 刷怪笼
block.minedustry-boss-spawner.description = 产生我的世界 Boss 生物。
block.minedustry-cobblestone.name = 圆石
block.minedustry-diamond-block.name = 钻石块
block.minedustry-diamond-block.description = 我的世界钻石块，吸收激光。
block.minedustry-netherite-block.name = 下界合金块
block.minedustry-netherite-block.description = 我的世界下界合金块，导电。
block.minedustry-obsidian.name = 黑曜石
block.minedustry-obsidian.description = 我的世界黑曜石，摧毁时碎裂成碎片。
block.minedustry-redstone-block.name = 红石块
block.minedustry-tnt.name = TNT
block.minedustry-tnt.description = 摧毁后会剧烈爆炸。
block.minedustry-gunpowder-factory.name = 火药工厂
block.minedustry-gunpowder-factory.description = 合成火药的工厂。
item.minedustry-cobblestone-item.name = 圆石
item.minedustry-cobblestone-item.description = 一种生产成本低廉且坚硬的石头。适合用于游戏初期建造墙壁。
item.minedustry-diamond.name = 钻石
item.minedustry-diamond.description = 闪烁且非常坚硬的石头。
item.minedustry-netherite-ingot.name = 下界合金锭
item.minedustry-netherite-ingot.description = 非常坚硬的合金。
item.minedustry-obsidian-item.name = 黑曜石
item.minedustry-obsidian-item.description = 快速冷却的岩浆，不知为何非常坚硬。
item.minedustry-redstone.name = 红石粉
item.minedustry-redstone.description = 带电的红色放射性粉末。
item.minedustry-calcite.name = 方解石
item.minedustry-calcite.description = 柔软的矿物，在塞普罗的地下储量极高，是钙基生产的必需品。
item.minedustry-gunpowder.name = 火药
item.minedustry-gunpowder.description = 用于生产TNT
liquid.minedustry-lava.name = 岩浆
liquid.minedustry-lava.description = 滚烫的熔岩，小心处理！
status.minedustry-absorption.name = 伤害吸收
status.minedustry-absorption.description = 暂时提升单位的最大生命值。
status.minedustry-hunger.name = 饥饿
status.minedustry-hunger.description = 使单位效率降低且变弱。
status.minedustry-levitation.name = 飘浮
status.minedustry-levitation.description = 使单位略微飘浮在地面上，并大幅降低其速度。升力不足以完全抬起单位，也不能保护其免受深层液体的伤害。
status.minedustry-mining-fatigue.name = 挖掘疲劳
status.minedustry-mining-fatigue.description = 降低攻击速度并将建造速度降至最低。
status.minedustry-poison.name = 中毒
status.minedustry-poison.description = 随着时间造成伤害，相对较弱。
status.minedustry-regeneration.name = 生命恢复
status.minedustry-regeneration.description = 治疗受影响的单位，但效果相对较弱。
status.minedustry-saturation.name = 饱和
status.minedustry-saturation.description = 使单位效率更高且更强。
status.minedustry-speed.name = 迅捷
status.minedustry-speed.description = 使单位速度变快。
status.minedustry-strength.name = 力量
status.minedustry-strength.description = 使单位更强。
status.minedustry-weakness.name = 虚弱
status.minedustry-weakness.description = 使单位造成的伤害大幅降低。
status.minedustry-wither-effect.name = 凋零
status.minedustry-wither-effect.description = 对受影响的单位造成伤害，每秒造成的伤害比中毒更高。
unit.minedustry-axolotl.name = 美西螈
unit.minedustry-axolotl.description = 我的世界美西螈，近战单位，治疗盟友。
unit.minedustry-bee.name = 蜜蜂
unit.minedustry-bee.description = 我的世界蜜蜂，近战单位，使敌人中毒，擅长运输物品。
unit.minedustry-blaze.name = 烈焰人
unit.minedustry-blaze.description = 我的世界烈焰人，远程单位，燃烧敌人，能造成近战伤害。
unit.minedustry-bogged.name = 沼骸
unit.minedustry-bogged.description = 我的世界沼骸，远程单位，使敌人中毒。
unit.minedustry-breeze.name = 旋风人
unit.minedustry-breeze.description = 我的世界旋风人，远程单位，造成巨大的伤害。
unit.minedustry-cave-spider.name = 洞穴蜘蛛
unit.minedustry-cave-spider.description = 我的世界洞穴蜘蛛，近战单位，使敌人中毒，可以跨越大多数地形。
unit.minedustry-creaking.name = 嘎枝
unit.minedustry-creaking.description = 我的世界嘎枝，近战单位，非常坚固，它有个有趣的名字。
unit.minedustry-creeper.name = 苦力怕
unit.minedustry-creeper.description = 我的世界苦力怕，在敌人附近爆炸。
unit.minedustry-dolphin.name = 海豚
unit.minedustry-dolphin.description = 我的世界海豚，近战单位，加速盟友。
unit.minedustry-drowned.name = 溺尸
unit.minedustry-drowned.description = 我的世界溺尸，远程单位，可以游泳。
unit.minedustry-husk.name = 尸壳
unit.minedustry-husk.description = 我的世界尸壳，近战单位，使敌人饥饿。
unit.minedustry-magmacube-large.name = 岩浆怪 (大)
unit.minedustry-magmacube-large.description = 我的世界大型岩浆怪，近战单位，死亡时分裂成 3-5 个岩浆怪。
unit.minedustry-magmacube-middle.name = 岩浆怪
unit.minedustry-magmacube-middle.description = 我的世界岩浆怪，近战单位，死亡时分裂成 3-5 个小型岩浆怪。
unit.minedustry-magmacube-small.name = 岩浆怪 (小)
unit.minedustry-magmacube-small.description = 我的世界小型岩浆怪，近战单位，无法再分裂。
unit.minedustry-parched.name = 焦骸
unit.minedustry-parched.description = 我的世界焦骸，远程单位，虚弱敌人，不会溺水。
unit.minedustry-skeleton.name = 骷髅
unit.minedustry-skeleton.description = 我的世界骷髅，远程单位，不会溺水。
unit.minedustry-slime-large.name = 史莱姆 (大)
unit.minedustry-slime-large.description = 我的世界大型史莱姆，近战单位，死亡时分裂成 3-5 个史莱姆。
unit.minedustry-slime-middle.name = 史莱姆
unit.minedustry-slime-middle.description = 我的世界史莱姆，近战单位，死亡时分裂成 3-5 个小型史莱姆。
unit.minedustry-slime-small.name = 史莱姆 (小)
unit.minedustry-slime-small.description = 我的世界小型史莱姆，近战单位，无法再分裂。
unit.minedustry-spider.name = 蜘蛛
unit.minedustry-spider.description = 我的世界蜘蛛，近战单位，可以跨越大多数地形。
unit.minedustry-stray.name = 流浪者
unit.minedustry-stray.description = 我的世界流浪者，远程单位，不会溺水，使敌人减速。
unit.minedustry-wither.name = 凋灵
unit.minedustry-wither.description = 我的世界凋灵，向敌人发射凋灵之首。
unit.minedustry-wither-skeleton.name = 凋灵骷髅
unit.minedustry-wither-skeleton.description = 我的世界凋灵骷髅，近战单位，使敌人凋零，不会溺水。
unit.minedustry-zombie.name = 僵尸
unit.minedustry-zombie.description = 我的世界僵尸，近战单位。